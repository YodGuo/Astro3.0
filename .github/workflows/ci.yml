name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Test
        run: npm run test

      - name: Generate mock data
        run: npm run build:mock

      - name: Build (with mock data — full prerendered output)
        run: npm run build

      - name: Verify static output
        run: |
          echo "=== Static file count ==="
          TOTAL=$(find dist/client -name "*.html" -o -name "*.xml" | wc -l)
          echo "Total: $TOTAL"
          test "$TOTAL" -ge 70 || { echo "FAIL: expected >= 70 static files, got $TOTAL"; exit 1; }

          echo ""
          echo "=== Critical pages ==="
          test -f dist/client/index.html || { echo "FAIL: index.html missing"; exit 1; }
          test -f dist/client/about/index.html || { echo "FAIL: about/index.html missing"; exit 1; }
          test -f dist/client/services/index.html || { echo "FAIL: services/index.html missing"; exit 1; }
          test -f dist/client/products/index.html || { echo "FAIL: products/index.html missing"; exit 1; }
          test -f dist/client/news/index.html || { echo "FAIL: news/index.html missing"; exit 1; }
          test -f dist/client/sitemap.xml || { echo "FAIL: sitemap.xml missing"; exit 1; }

          echo ""
          echo "=== Product detail pages (/product/) ==="
          PRODUCT_COUNT=$(find dist/client/product -name "*.html" | wc -l)
          echo "Product details: $PRODUCT_COUNT"
          test "$PRODUCT_COUNT" -ge 1 || { echo "FAIL: no product detail pages"; exit 1; }

          echo ""
          echo "=== Article detail pages (/article/) ==="
          ARTICLE_COUNT=$(find dist/client/article -name "*.html" | wc -l)
          echo "Article details: $ARTICLE_COUNT"
          test "$ARTICLE_COUNT" -ge 1 || { echo "FAIL: no article detail pages"; exit 1; }

          echo ""
          echo "=== Product category pages ==="
          CAT_COUNT=$(find dist/client/products -mindepth 2 -name "*.html" | wc -l)
          echo "Category/pagination pages: $CAT_COUNT"
          test "$CAT_COUNT" -ge 1 || { echo "FAIL: no product category pages"; exit 1; }

          echo ""
          echo "=== News tag pages ==="
          TAG_COUNT=$(find dist/client/news -mindepth 2 -name "*.html" | wc -l)
          echo "Tag/pagination pages: $TAG_COUNT"
          test "$TAG_COUNT" -ge 1 || { echo "FAIL: no news tag pages"; exit 1; }

          echo ""
          echo "=== Content verification ==="
          grep -q "PowerTech Solutions" dist/client/index.html || { echo "FAIL: branding not injected"; exit 1; }
          grep -q "powertech.example.com" dist/client/sitemap.xml || { echo "FAIL: domain not in sitemap"; exit 1; }

          echo ""
          echo "All checks passed ✓ ($TOTAL files)"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  build-with-d1-data:
    name: Build with D1 Data (full)
    runs-on: ubuntu-latest
    needs: lint-test-build
    # Only runs when CLOUDFLARE_API_TOKEN is available (push to main)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Export D1 data and build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run build:full

      - name: Verify static output with D1 data
        run: |
          echo "=== Static file count ==="
          TOTAL=$(find dist/client -name "*.html" -o -name "*.xml" | wc -l)
          echo "Total: $TOTAL"

          echo ""
          echo "=== Product detail pages (/product/) ==="
          find dist/client/product -name "*.html" | wc -l

          echo ""
          echo "=== Article detail pages (/article/) ==="
          find dist/client/article -name "*.html" | wc -l

          echo ""
          echo "=== Product category pages ==="
          find dist/client/products -mindepth 2 -name "*.html" | wc -l

          echo ""
          echo "=== News tag pages ==="
          find dist/client/news -mindepth 2 -name "*.html" | wc -l

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-with-d1
          path: dist/
          retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-with-d1-data
    # Only runs when CLOUDFLARE_API_TOKEN is available (push to main)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output-with-d1
          path: dist/

      - name: Deploy to Cloudflare Workers (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env staging
